<!DOCTYPE html>
<html>
<body style="margin:0; padding:0; background:#f5f7fb; font-family:Arial, sans-serif;">
    <table width="100%">
        <tr>
            <td align="center" style="padding:40px 0;">

                <table width="600" style="background:#ffffff; padding:30px; border-radius:8px;">

                    <tr>
                        <td style="font-size:20px; font-weight:bold;">
                            LeadFlow AI
                        </td>
                    </tr>

                    <tr><td height="20"></td></tr>

                    <tr>
                        <td style="font-size:16px;">
                            {{content}}
                        </td>
                    </tr>

                    <tr>
                        <td align="center" style="padding:30px 0;">
                            <a href="{{action_url}}"
                               style="background:#4f46e5; color:#fff; padding:12px 24px; text-decoration:none; border-radius:6px;">
                                {{action_text}}
                            </a>
                        </td>
                    </tr>

                    <tr>
                        <td style="font-size:12px; color:#777;">
                            <a href="{{action_url}}">{{action_url}}</a>
                        </td>
                    </tr>

                    <tr>
                        <td style="padding-top:30px; font-size:12px; color:#999;">
                            © {{year}} LeadFlow AI
                        </td>
                    </tr>

                </table>

            </td>
        </tr>
    </table>
</body>
</html>
