<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LeadFlow AI</title>
</head>
<body style="margin:0; padding:0; background:#f5f7fb; font-family:Arial, sans-serif;">
    <table width="100%" cellpadding="0" cellspacing="0" style="background:#f5f7fb;">
        <tr>
            <td align="center" style="padding:32px 16px;">

                <table width="100%" cellpadding="0" cellspacing="0" style="max-width:600px; background:#ffffff; border-radius:10px; overflow:hidden;">
                    <tr>
                        <td style="padding:28px 32px 8px 32px;">
                            <div style="font-size:22px; font-weight:700; color:#111827;">LeadFlow AI</div>
                            <div style="font-size:13px; color:#6b7280; margin-top:6px;">by Vishnexa</div>
                        </td>
                    </tr>

                    <tr>
                        <td style="padding:12px 32px 8px 32px; font-size:16px; color:#374151; line-height:1.7;">
                            {{content}}
                        </td>
                    </tr>

                    <tr>
                        <td align="center" style="padding:28px 32px 12px 32px;">
                            <a href="{{action_url}}"
                               style="display:inline-block; background:#4f46e5; color:#ffffff; padding:12px 24px; text-decoration:none; border-radius:8px; font-weight:700; font-size:14px;">
                                {{action_text}}
                            </a>
                        </td>
                    </tr>

                    <tr>
                        <td style="padding:8px 32px 0 32px; font-size:12px; color:#6b7280; line-height:1.7;">
                            If the button doesn’t work, copy and paste this link into your browser:
                            <br />
                            <a href="{{action_url}}" style="color:#4f46e5; word-break:break-all;">{{action_url}}</a>
                        </td>
                    </tr>

                    <tr>
                        <td style="padding:24px 32px 32px 32px; font-size:12px; color:#9ca3af; line-height:1.8;">
                            If you didn’t request this, you can safely ignore this email.
                            <br /><br />
                            © {{year}} LeadFlow AI by Vishnexa
                            <br />
                            <a href="https://leadflow.vishnexa.com" style="color:#4f46e5; text-decoration:none;">
                                leadflow.vishnexa.com
                            </a>
                        </td>
                    </tr>
                </table>

            </td>
        </tr>
    </table>
</body>
</html>
